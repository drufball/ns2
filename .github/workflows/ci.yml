name: CI

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Clippy + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Clippy
        run: cargo clippy --tests -- -D warnings -W clippy::pedantic -W clippy::nursery

      - name: Coverage
        run: |
          IGNORE_FLAGS=$(python3 - <<'EOF'
          import sys
          try:
              import tomllib
          except ImportError:
              try:
                  import tomli as tomllib
              except ImportError:
                  sys.exit(0)
          with open('crates/arch-tests/coverage-ignores.toml', 'rb') as f:
              data = tomllib.load(f)
          patterns = [e['path'] for e in data.get('file_ignore', [])]
          if patterns:
              print('--ignore-filename-regex ' + '|'.join(patterns))
          EOF
          )
          # shellcheck disable=SC2086
          cargo llvm-cov --fail-under-lines 85 $IGNORE_FLAGS
